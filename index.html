<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="weather-box">

        <h1>🌤 Weather App</h1>

            id="cityInput"
            placeholder="Enter City Name">

        <button onclick="getWeather()">

        <div id="weatherResult"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
